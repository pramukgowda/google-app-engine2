<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Page</title>
    <style>
        /* CSS: This makes it look pretty */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f9;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello, World! 👋</h1>
        <p>This is a simple web page built with HTML and CSS.</p>
        <p id="message">Click the button below for a surprise.</p>
        <button onclick="revealMessage()">Click Me!</button>
    </div>

    <script>
        // JavaScript: This adds interactivity
        function revealMessage() {
            const msg = document.getElementById('message');
            msg.innerHTML = "<strong>You're doing great! Keep coding. 🚀</strong>";
            msg.style.color = "#28a745";
        }
    </script>

</body>
</html>
